<!DOCTYPE html>
<html>
<head>
    <title>Premium UI User</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
            color: white;
        }

        h2 {
            margin-top: 40px;
        }

        /* FORM */
        .form {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        input {
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #6c5ce7;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #a29bfe;
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: left;
        }

        th {
            background: rgba(255,255,255,0.1);
        }

        tr:hover {
            background: rgba(255,255,255,0.08);
        }

        /* LIST */
        ul {
            padding: 0;
        }

        li {
            list-style: none;
            padding: 12px;
            margin: 5px 0;
            background: rgba(255,255,255,0.08);
            border-radius: 8px;
            transition: 0.3s;
        }

        li:hover {
            transform: translateX(5px);
            background: rgba(255,255,255,0.15);
        }

        /* CARD */
        #cardContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .card {
            width: 220px;
            padding: 15px;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.03);
        }

        .card h3 {
            margin: 0;
        }

        .card p {
            margin: 5px 0;
            color: #dfe6e9;
        }

    </style>
</head>
<body>

<div class="form">
    <h2>Tambah User</h2>
    <input type="text" id="namaDepan" placeholder="Nama Depan">
    <input type="text" id="namaBelakang" placeholder="Nama Belakang">
    <button onclick="tambahUser()">Tambah</button>
</div>

<h2>Table User</h2>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Nama</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<h2>List User</h2>
<ul id="listUser"></ul>

<h2>Card User</h2>
<div id="cardContainer"></div>

<script>
let users = [
    { id: 1, nama_depan: "Sari", nama_belakang: "Putri" },
    { id: 2, nama_depan: "Dina", nama_belakang: "Saputra" }
];

function getNamaLengkap(user) {
    return user.nama_depan + " " + user.nama_belakang;
}

function renderTable(data) {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";
    data.forEach(user => {
        tbody.innerHTML += `
            <tr>
                <td>${user.id}</td>
                <td>${getNamaLengkap(user)}</td>
            </tr>
        `;
    });
}

function renderList(data) {
    const list = document.getElementById("listUser");
    list.innerHTML = "";
    data.forEach(user => {
        list.innerHTML += `
            <li>${getNamaLengkap(user)}</li>
        `;
    });
}

function renderCard(data) {
    const container = document.getElementById("cardContainer");
    container.innerHTML = "";
    data.forEach(user => {
        container.innerHTML += `
            <div class="card">
                <h3>${getNamaLengkap(user)}</h3>
                <p>ID: ${user.id}</p>
            </div>
        `;
    });
}

function renderAll() {
    renderTable(users);
    renderList(users);
    renderCard(users);
}

function tambahUser() {
    const depan = document.getElementById("namaDepan").value;
    const belakang = document.getElementById("namaBelakang").value;

    if (depan === "" || belakang === "") {
        alert("Isi semua field!");
        return;
    }

    users.push({
        id: users.length + 1,
        nama_depan: depan,
        nama_belakang: belakang
    });

    renderAll();

    document.getElementById("namaDepan").value = "";
    document.getElementById("namaBelakang").value = "";
}

renderAll();
</script>

</body>
</html>
