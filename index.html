<!DOCTYPE html>
<html>
<head>
    <title>Table User</title>
</head>
<body>

<h2>Tambah User</h2>

<input type="text" id="namaDepan" placeholder="Nama Depan">
<input type="text" id="namaBelakang" placeholder="Nama Belakang">
<button onclick="tambahUser()">Tambah</button>

<h2>List User</h2>

<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nama Depan</th>
            <th>Nama Belakang</th>
        </tr>
    </thead>
    <tbody id="bodyTable"></tbody>
</table>

<script>
// DATA
let users = [
    { id: 1, nama_depan: "Sari", nama_belakang: "Putri" },
    { id: 2, nama_depan: "Dina", nama_belakang: "Saputra" }
];

// RENDER (Reusable & Modular)
function renderTable(data) {
    const tbody = document.getElementById("bodyTable");
    tbody.innerHTML = "";

    data.forEach(user => {
        const row = `
            <tr>
                <td>${user.id}</td>
                <td>${user.nama_depan}</td>
                <td>${user.nama_belakang}</td>
            </tr>
        `;
        tbody.innerHTML += row;
    });
}

// TAMBAH USER
function tambahUser() {
    const namaDepan = document.getElementById("namaDepan").value;
    const namaBelakang = document.getElementById("namaBelakang").value;

    if (namaDepan === "" || namaBelakang === "") {
        alert("Isi semua field!");
        return;
    }

    const newUser = {
        id: users.length + 1,
        nama_depan: namaDepan,
        nama_belakang: namaBelakang
    };

    users.push(newUser);

    renderTable(users); // update tampilan

    // reset input
    document.getElementById("namaDepan").value = "";
    document.getElementById("namaBelakang").value = "";
}

// INIT
renderTable(users);

</script>

</body>
</html>
